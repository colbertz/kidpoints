name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.ALIYUN_REGISTRY }}/points-app-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.ALIYUN_REGISTRY }}/points-app-frontend:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            mkdir -p /app/points-app/data
            cat > /app/points-app/docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              backend:
                image: ${{ secrets.ALIYUN_REGISTRY }}/points-app-backend:latest
                restart: always
                ports:
                  - "8080:8080"
                volumes:
                  - ./data:/app/data
                  - ./uploads:/app/uploads
                environment:
                  - PORT=8080
                  - DB_PATH=./data/points.db

              frontend:
                image: ${{ secrets.ALIYUN_REGISTRY }}/points-app-frontend:latest
                restart: always
                ports:
                  - "80:80"
                depends_on:
                  - backend
            EOF
            cd /app/points-app
            docker-compose down --rmi local 2>/dev/null || true
            docker-compose pull
            docker-compose up -d
            docker image prune -f
